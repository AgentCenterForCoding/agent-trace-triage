<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Trace 定界工具</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1f2328; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        h1 { color: #0969da; font-size: 22px; }
        .subtitle { color: #656d76; font-size: 13px; margin-top: 2px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .upload-label { background: #f6f8fa; border: 1px solid #d1d9e0; color: #1f2328; padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: border-color 0.15s; }
        .upload-label:hover { border-color: #0969da; }
        .file-input { display: none; }

        /* Stats bar */
        .stats-bar { display: flex; gap: 24px; margin-bottom: 20px; padding: 12px 16px; background: #f6f8fa; border: 1px solid #d1d9e0; border-radius: 8px; }
        .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #656d76; }
        .stat-value { font-weight: 600; color: #1f2328; }
        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-dot.error { background: #cf222e; }
        .stat-dot.ok { background: #1a7f37; }
        .stat-dot.warning { background: #9a6700; }

        /* Trace list table */
        .trace-list { border: 1px solid #d1d9e0; border-radius: 8px; overflow: hidden; }
        .trace-header-row { display: grid; grid-template-columns: 32px 1fr 80px 130px 100px 80px 120px; align-items: center; padding: 10px 16px; background: #f6f8fa; border-bottom: 1px solid #d1d9e0; font-size: 12px; font-weight: 600; color: #656d76; text-transform: uppercase; letter-spacing: 0.5px; }
        .trace-row { display: grid; grid-template-columns: 32px 1fr 80px 130px 100px 80px 120px; align-items: center; padding: 12px 16px; border-bottom: 1px solid #eaeef2; cursor: pointer; transition: background 0.1s; }
        .trace-row:last-child { border-bottom: none; }
        .trace-row:hover { background: #f6f8fa; }
        .trace-row.expanded { background: #f6f8fa; border-bottom-color: #d1d9e0; }
        .trace-row.has-error { border-left: 3px solid #cf222e; padding-left: 13px; }
        .trace-row.has-warning { border-left: 3px solid #9a6700; padding-left: 13px; }
        .trace-row.all-ok { border-left: 3px solid #1a7f37; padding-left: 13px; }
        .trace-row.not-analyzed { border-left: 3px solid #d1d9e0; padding-left: 13px; }

        .row-expand { font-size: 12px; color: #656d76; transition: transform 0.2s; }
        .row-expand.open { transform: rotate(90deg); }
        .row-name { font-size: 13px; font-weight: 500; }
        .row-name .trace-label { color: #1f2328; }
        .row-name .trace-id { color: #656d76; font-size: 11px; font-family: monospace; margin-left: 8px; }

        .row-status { font-size: 12px; }
        .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .status-badge.error { background: #ffebe9; color: #cf222e; border: 1px solid #cf222e33; }
        .status-badge.ok { background: #dafbe1; color: #1a7f37; border: 1px solid #1a7f3733; }
        .status-badge.anomaly { background: #fff8c5; color: #9a6700; border: 1px solid #9a670033; }
        .status-badge.pending { background: #eaeef2; color: #656d76; border: 1px solid #afb8c133; }

        .row-owner { font-size: 12px; }
        .owner-badge { padding: 3px 10px; border-radius: 12px; font-weight: 500; font-size: 11px; }
        .owner-badge.agent_team { background: #ddf4ff; color: #0969da; border: 1px solid #54aeff44; }
        .owner-badge.model_team { background: #fbefff; color: #8250df; border: 1px solid #c297ff44; }
        .owner-badge.mcp_team { background: #fff8c5; color: #9a6700; border: 1px solid #d4a72c44; }
        .owner-badge.skill_team { background: #dafbe1; color: #1a7f37; border: 1px solid #4ac26b44; }
        .owner-badge.user_interaction { background: #ffebe9; color: #cf222e; border: 1px solid #cf222e33; }
        .owner-badge.unknown { background: #eaeef2; color: #656d76; border: 1px solid #afb8c133; }

        .row-confidence { font-size: 12px; color: #656d76; }
        .confidence-mini { display: flex; align-items: center; gap: 6px; }
        .confidence-mini .bar { width: 40px; height: 4px; background: #eaeef2; border-radius: 2px; overflow: hidden; }
        .confidence-mini .fill { height: 100%; border-radius: 2px; }

        .row-spans { font-size: 12px; color: #656d76; font-family: monospace; }

        /* Analyze button */
        .analyze-btn { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid #d1d9e0; background: #f6f8fa; color: #1f2328; transition: all 0.15s; }
        .analyze-btn:hover { border-color: #0969da; color: #0969da; background: #ffffff; }
        .analyze-btn.l2 { border-color: #8250df; color: #8250df; background: #fbefff; }
        .analyze-btn.l2:hover { background: #f0e0ff; }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .analyze-btn .spinner-sm { display: inline-block; width: 10px; height: 10px; border: 1.5px solid #d1d9e0; border-top-color: #0969da; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }

        /* Detail panel (expandable) */
        .detail-panel { display: none; border-bottom: 1px solid #d1d9e0; background: #ffffff; padding: 20px 16px 20px 48px; }
        .detail-panel.open { display: block; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 1000px) { .detail-grid { grid-template-columns: 1fr; } }

        .detail-section { background: #f6f8fa; border: 1px solid #d1d9e0; border-radius: 8px; padding: 16px; }
        .detail-section h3 { font-size: 13px; color: #656d76; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-section.full-width { grid-column: 1 / -1; }

        /* Triage summary in detail */
        .triage-summary { font-size: 13px; line-height: 1.6; color: #1f2328; }
        .triage-summary .root-cause-text { background: #ffffff; border: 1px solid #d1d9e0; border-radius: 4px; padding: 8px 10px; margin-top: 8px; font-size: 12px; }
        .co-responsible { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .co-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #eaeef2; border: 1px solid #d1d9e0; color: #1f2328; }

        /* Waterfall in detail */
        .waterfall-compact { max-height: 300px; overflow-y: auto; }
        .span-row { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #eaeef233; font-size: 12px; }
        .span-row:last-child { border-bottom: none; }
        .span-name { min-width: 200px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .span-name.error { color: #cf222e; }
        .span-name.anomaly { color: #9a6700; }
        .span-name.ok { color: #1a7f37; }
        .span-name.root-cause-span { background: #ffebe9; padding: 1px 4px; border-radius: 2px; border: 1px solid #cf222e33; }
        .span-layer-tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-left: 6px; }
        .layer-agent { background: #ddf4ff; color: #0969da; }
        .layer-model { background: #fbefff; color: #8250df; }
        .layer-mcp { background: #fff8c5; color: #9a6700; }
        .layer-skill { background: #dafbe1; color: #1a7f37; }
        .layer-user { background: #ffebe9; color: #cf222e; }
        .layer-unknown { background: #eaeef2; color: #656d76; }
        .span-bar-area { flex: 1; padding: 0 8px; }
        .span-bar { height: 4px; border-radius: 2px; min-width: 2px; }
        .span-bar.error { background: #cf222e; }
        .span-bar.ok { background: #0969da; }
        .span-bar.anomaly { background: #9a6700; }
        .span-duration { min-width: 60px; text-align: right; color: #656d76; font-family: monospace; font-size: 11px; }

        /* Evidence chain in detail */
        .chain-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 12px; }
        .chain-arrow { color: #cf222e; font-size: 14px; min-width: 16px; text-align: center; padding-top: 1px; }
        .chain-content .span-ref { font-family: monospace; color: #0969da; }

        /* Action items in detail */
        .action-item { padding: 6px 10px; background: #ffffff; border: 1px solid #d1d9e0; border-radius: 4px; margin-bottom: 6px; font-size: 12px; }
        .action-team { font-weight: 600; color: #0969da; }

        /* Loading state */
        .loading { text-align: center; color: #656d76; padding: 40px; font-size: 14px; }
        .loading .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #d1d9e0; border-top-color: #0969da; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; color: #656d76; padding: 60px 20px; font-size: 14px; }

        /* Settings button */
        .settings-btn { background: none; border: 1px solid #d1d9e0; border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 13px; color: #656d76; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
        .settings-btn:hover { border-color: #0969da; color: #0969da; }
        .settings-btn.llm-active { border-color: #8250df; color: #8250df; }
        .settings-btn svg { width: 14px; height: 14px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #ffffff; border-radius: 12px; width: 480px; max-width: 90vw; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #d1d9e0; }
        .modal-header h2 { font-size: 16px; color: #1f2328; }
        .modal-close { background: none; border: none; font-size: 20px; color: #656d76; cursor: pointer; padding: 4px 8px; }
        .modal-close:hover { color: #1f2328; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #d1d9e0; display: flex; justify-content: flex-end; gap: 12px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #1f2328; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d1d9e0; border-radius: 6px; font-size: 13px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.1); }
        .form-group .hint { font-size: 11px; color: #656d76; margin-top: 4px; }

        .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #d1d9e0; border-radius: 24px; transition: background 0.2s; }
        .toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #ffffff; border-radius: 50%; transition: transform 0.2s; }
        .toggle input:checked + .slider { background: #8250df; }
        .toggle input:checked + .slider::before { transform: translateX(20px); }
        .toggle-label { font-size: 13px; color: #1f2328; font-weight: 500; }

        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
        .btn-secondary { background: #f6f8fa; border: 1px solid #d1d9e0; color: #1f2328; }
        .btn-secondary:hover { background: #eaeef2; }
        .btn-primary { background: #8250df; border: 1px solid #8250df; color: #ffffff; }
        .btn-primary:hover { background: #6f42c1; }

        /* Source badge */
        .source-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .source-badge.rules { background: #ddf4ff; color: #0969da; }
        .source-badge.llm { background: #fbefff; color: #8250df; }

        /* Reasoning section */
        .reasoning-text { background: #fbefff; border: 1px solid #e2c6ff; border-radius: 4px; padding: 10px 12px; margin-top: 10px; font-size: 12px; line-height: 1.5; color: #1f2328; white-space: pre-wrap; }

        /* Placeholder text for un-analyzed */
        .placeholder-text { color: #afb8c1; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Agent Trace 定界工具</h1>
                <p class="subtitle">基于 OTel Trace 的 Agent 故障自动归因</p>
            </div>
            <div class="header-actions">
                <button class="settings-btn" id="settingsBtn" onclick="openSettings()">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.04.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.103-.303c-.066-.019-.176-.011-.299.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.212.224l-.288 1.107c-.17.645-.716 1.195-1.459 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.065-1.289-.615-1.459-1.26l-.288-1.107c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.049-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.04-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.103.303c.066.019.176.011.299-.071.214-.143.437-.272.668-.386.133-.066.194-.158.212-.224l.288-1.107C5.847.645 6.393.095 7.136.03A8.12 8.12 0 0 1 8 0ZM5.5 8a2.5 2.5 0 1 0 5 0 2.5 2.5 0 0 0-5 0Z"/></svg>
                    L2 LLM
                </button>
                <label class="upload-label" for="fileInput">+ 上传 Trace</label>
                <input type="file" id="fileInput" class="file-input" accept=".json" onchange="uploadFile(event)">
            </div>
        </header>

        <!-- LLM Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>L2 LLM 设置</h2>
                    <button class="modal-close" onclick="closeSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="toggle-row">
                        <label class="toggle">
                            <input type="checkbox" id="llmEnabled">
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label">启用 L2 LLM 推理</span>
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input type="text" id="llmBaseUrl" value="https://coding.dashscope.aliyuncs.com/apps/anthropic">
                        <div class="hint">默认：DashScope Anthropic 兼容端点</div>
                    </div>
                    <div class="form-group">
                        <label>模型</label>
                        <input type="text" id="llmModel" value="qwen3.6-plus">
                        <div class="hint">LLM API 模型名称</div>
                    </div>
                    <div class="form-group">
                        <label>置信度阈值</label>
                        <input type="number" id="llmThreshold" value="0.8" min="0" max="1" step="0.1">
                        <div class="hint">L1 置信度低于此值时触发 L2（0.0-1.0）</div>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="llmApiKey" placeholder="输入 API Key">
                        <div class="hint">L2 推理必需</div>
                    </div>
                    <div class="form-group">
                        <label>超时时间（秒）</label>
                        <input type="number" id="llmTimeout" value="60" min="5" max="120">
                    </div>
                    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #eaeef2">
                        <button class="btn btn-secondary" id="testConnBtn" onclick="testConnection()" style="width:100%;justify-content:center;display:flex;align-items:center;gap:6px">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-1.06-1.06L6.25 9.69 5.28 8.72a.751.751 0 0 0-1.06 1.06l1.5 1.5a.749.749 0 0 0 1.06 0l5-5Z"/></svg>
                            测试连通性
                        </button>
                        <div id="testResult" style="margin-top:8px;font-size:12px;display:none"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
        </div>

        <div class="stats-bar" id="statsBar" style="display:none">
            <div class="stat-item"><span class="stat-dot error"></span><span class="stat-value" id="statError">0</span> 错误</div>
            <div class="stat-item"><span class="stat-dot warning"></span><span class="stat-value" id="statWarning">0</span> 异常</div>
            <div class="stat-item"><span class="stat-dot ok"></span><span class="stat-value" id="statOk">0</span> 正常</div>
            <div class="stat-item" style="margin-left:auto"><span class="source-badge rules">L1</span> <span class="stat-value" id="statL1">0</span></div>
            <div class="stat-item"><span class="source-badge llm">L2</span> <span class="stat-value" id="statL2">0</span></div>
            <div class="stat-item">共 <span class="stat-value" id="statTotal">0</span> 条 Trace</div>
        </div>

        <div id="traceListContainer">
            <div class="loading"><span class="spinner"></span>正在加载 Trace 列表...</div>
        </div>
    </div>

    <script>
        const API = '';

        let allTraces = [];

        // LLM Config management
        const LLM_CONFIG_KEY = 'agent-trace-triage-llm-config';
        const DEFAULT_LLM_CONFIG = {
            enabled: false,
            baseUrl: 'https://coding.dashscope.aliyuncs.com/apps/anthropic',
            model: 'qwen3.6-plus',
            threshold: 0.8,
            apiKey: '',
            timeout: 60
        };

        function loadLLMConfig() {
            try {
                const stored = localStorage.getItem(LLM_CONFIG_KEY);
                if (stored) {
                    return { ...DEFAULT_LLM_CONFIG, ...JSON.parse(stored) };
                }
            } catch (e) {}
            return { ...DEFAULT_LLM_CONFIG };
        }

        function saveLLMConfig(config) {
            localStorage.setItem(LLM_CONFIG_KEY, JSON.stringify(config));
            updateSettingsButtonState();
        }

        function getLLMHeaders() {
            const config = loadLLMConfig();
            if (!config.enabled || !config.apiKey) return {};
            return {
                'X-LLM-Enabled': 'true',
                'X-LLM-Base-URL': config.baseUrl,
                'X-LLM-Model': config.model,
                'X-LLM-Threshold': String(config.threshold),
                'X-LLM-API-Key': config.apiKey,
                'X-LLM-Timeout': String(config.timeout)
            };
        }

        function updateSettingsButtonState() {
            const config = loadLLMConfig();
            const btn = document.getElementById('settingsBtn');
            if (config.enabled && config.apiKey) {
                btn.classList.add('llm-active');
                btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.04.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.103-.303c-.066-.019-.176-.011-.299.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.212.224l-.288 1.107c-.17.645-.716 1.195-1.459 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.065-1.289-.615-1.459-1.26l-.288-1.107c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.049-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.04-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.103.303c.066.019.176.011.299-.071.214-.143.437-.272.668-.386.133-.066.194-.158.212-.224l.288-1.107C5.847.645 6.393.095 7.136.03A8.12 8.12 0 0 1 8 0ZM5.5 8a2.5 2.5 0 1 0 5 0 2.5 2.5 0 0 0-5 0Z"/></svg> L2 已启用`;
            } else {
                btn.classList.remove('llm-active');
                btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.04.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.103-.303c-.066-.019-.176-.011-.299.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.212.224l-.288 1.107c-.17.645-.716 1.195-1.459 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.065-1.289-.615-1.459-1.26l-.288-1.107c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.049-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.04-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.103.303c.066.019.176.011.299-.071.214-.143.437-.272.668-.386.133-.066.194-.158.212-.224l.288-1.107C5.847.645 6.393.095 7.136.03A8.12 8.12 0 0 1 8 0ZM5.5 8a2.5 2.5 0 1 0 5 0 2.5 2.5 0 0 0-5 0Z"/></svg> L2 LLM`;
            }
        }

        function openSettings() {
            const config = loadLLMConfig();
            document.getElementById('llmEnabled').checked = config.enabled;
            document.getElementById('llmBaseUrl').value = config.baseUrl;
            document.getElementById('llmModel').value = config.model;
            document.getElementById('llmThreshold').value = config.threshold;
            document.getElementById('llmApiKey').value = config.apiKey;
            document.getElementById('llmTimeout').value = config.timeout;
            document.getElementById('settingsModal').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('open');
        }

        function saveSettings() {
            const config = {
                enabled: document.getElementById('llmEnabled').checked,
                baseUrl: document.getElementById('llmBaseUrl').value,
                model: document.getElementById('llmModel').value,
                threshold: parseFloat(document.getElementById('llmThreshold').value) || 0.8,
                apiKey: document.getElementById('llmApiKey').value,
                timeout: parseInt(document.getElementById('llmTimeout').value) || 60
            };
            saveLLMConfig(config);
            closeSettings();
            renderList();
        }

        async function testConnection() {
            const btn = document.getElementById('testConnBtn');
            const resultDiv = document.getElementById('testResult');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;margin-right:0"></span> 测试中...';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '';
            resultDiv.style.color = '#656d76';

            const config = {
                baseUrl: document.getElementById('llmBaseUrl').value,
                model: document.getElementById('llmModel').value,
                apiKey: document.getElementById('llmApiKey').value,
                timeout: parseInt(document.getElementById('llmTimeout').value) || 60,
            };

            if (!config.apiKey) {
                resultDiv.style.color = '#cf222e';
                resultDiv.textContent = '请先输入 API Key';
                btn.disabled = false;
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-1.06-1.06L6.25 9.69 5.28 8.72a.751.751 0 0 0-1.06 1.06l1.5 1.5a.749.749 0 0 0 1.06 0l5-5Z"/></svg> 测试连通性';
                return;
            }

            try {
                const headers = {
                    'X-LLM-Enabled': 'true',
                    'X-LLM-Base-URL': config.baseUrl,
                    'X-LLM-Model': config.model,
                    'X-LLM-API-Key': config.apiKey,
                    'X-LLM-Timeout': String(config.timeout),
                };
                const res = await fetch(`${API}/api/llm/test-connection`, { method: 'POST', headers });
                const data = await res.json();
                if (data.status === 'ok') {
                    resultDiv.style.color = '#1a7f37';
                    resultDiv.innerHTML = `&#10003; ${escapeHtml(data.message)}`;
                } else {
                    resultDiv.style.color = '#cf222e';
                    resultDiv.innerHTML = `&#10007; ${escapeHtml(data.message)}`;
                }
            } catch (e) {
                resultDiv.style.color = '#cf222e';
                resultDiv.textContent = '���接失败: ' + e.message;
            }

            btn.disabled = false;
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-1.06-1.06L6.25 9.69 5.28 8.72a.751.751 0 0 0-1.06 1.06l1.5 1.5a.749.749 0 0 0 1.06 0l5-5Z"/></svg> 测试连通性';
        }

        // Close modal on backdrop click
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeSettings();
            }
        });

        async function init() {
            updateSettingsButtonState();
            try {
                const res = await fetch(`${API}/api/samples`);
                const samples = await res.json();

                allTraces = samples.map(s => ({
                    name: s.name,
                    analyzed: false,
                    analyzing: true,
                    triage: null,
                    spans: null,
                    span_count: 0,
                }));

                renderList();

                // 默认全量 L1 分析（不带 LLM headers → 纯规则引擎，极快）
                await Promise.all(allTraces.map(async (item) => {
                    try {
                        const r = await fetch(`${API}/api/samples/${item.name}`);
                        const data = await r.json();
                        item.analyzed = true;
                        item.triage = data.triage;
                        item.spans = data.spans;
                        item.span_count = data.span_count || (data.spans ? data.spans.length : 0);
                        item.trace_id = data.trace_id;
                        item.raw_trace = data.raw_trace;
                    } catch (e) {}
                    item.analyzing = false;
                }));

                renderList();
            } catch (e) {
                document.getElementById('traceListContainer').innerHTML =
                    '<div class="empty-state">加载失败，请确认后端服务是否运行</div>';
            }
        }

        async function analyzeTrace(idx, useL2) {
            const item = allTraces[idx];
            if (item.analyzing) return;

            item.analyzing = true;
            renderList();

            try {
                const headers = useL2 ? getLLMHeaders() : {};
                const endpoint = item.uploaded
                    ? null  // uploaded traces are already analyzed
                    : `${API}/api/samples/${item.name}`;

                if (!endpoint) {
                    item.analyzing = false;
                    renderList();
                    return;
                }

                const res = await fetch(endpoint, { headers });
                const data = await res.json();

                item.analyzed = true;
                item.analyzing = false;
                item.triage = data.triage;
                item.spans = data.spans;
                item.span_count = data.span_count || (data.spans ? data.spans.length : 0);
                item.trace_id = data.trace_id;
                item.raw_trace = data.raw_trace;

                renderList();

                // Auto-expand the detail panel after analysis
                const panel = document.getElementById(`detail-${idx}`);
                const expand = document.getElementById(`expand-${idx}`);
                const row = document.getElementById(`row-${idx}`);
                if (panel && !panel.classList.contains('open')) {
                    document.querySelectorAll('.detail-panel.open').forEach(p => p.classList.remove('open'));
                    document.querySelectorAll('.row-expand.open').forEach(e => e.classList.remove('open'));
                    document.querySelectorAll('.trace-row.expanded').forEach(r => r.classList.remove('expanded'));
                    panel.classList.add('open');
                    if (expand) expand.classList.add('open');
                    if (row) row.classList.add('expanded');
                }
            } catch (e) {
                item.analyzing = false;
                renderList();
            }
        }

        async function uploadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch(`${API}/api/trace/upload`, {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();
                allTraces.unshift({
                    name: file.name.replace('.json', ''),
                    analyzed: true,
                    analyzing: false,
                    uploaded: true,
                    triage: data.triage,
                    span_count: data.span_count,
                    trace_id: data.trace_id,
                    spans: data.spans || [],
                });
                renderList();
            } catch (e) {
                alert('上传失败: ' + e.message);
            }
            event.target.value = '';
        }

        function getTraceStatus(item) {
            if (!item.analyzed || !item.triage) return 'pending';
            const t = item.triage;
            if (t.fault_span && t.fault_span.status === 'ERROR') return 'error';
            if (t.primary_owner && t.primary_owner !== 'unknown') return 'error';
            if (t.confidence > 0 && t.fault_chain && t.fault_chain.length > 0) return 'anomaly';
            return 'ok';
        }

        function getStatusLabel(status) {
            if (status === 'error') return '错误';
            if (status === 'anomaly') return '异常';
            if (status === 'pending') return '待分析';
            return '正常';
        }

        function getOwnerLabel(owner) {
            const map = {
                'agent_team': 'Agent 团队',
                'model_team': 'Model 团队',
                'mcp_team': 'MCP 团队',
                'skill_team': 'Skill 团队',
                'user_interaction': '用户交互',
                'unknown': '未知',
            };
            return map[owner] || owner;
        }

        function renderList() {
            const container = document.getElementById('traceListContainer');

            // Compute stats
            let errorCount = 0, warningCount = 0, okCount = 0, l1Count = 0, l2Count = 0, analyzedCount = 0;
            allTraces.forEach(item => {
                if (!item.analyzed) return;
                analyzedCount++;
                const s = getTraceStatus(item);
                if (s === 'error') errorCount++;
                else if (s === 'anomaly') warningCount++;
                else okCount++;
                const src = (item.triage || {}).source || 'rules';
                if (src === 'llm') l2Count++;
                else l1Count++;
            });

            const statsBar = document.getElementById('statsBar');
            if (analyzedCount > 0) {
                statsBar.style.display = 'flex';
                document.getElementById('statError').textContent = errorCount;
                document.getElementById('statWarning').textContent = warningCount;
                document.getElementById('statOk').textContent = okCount;
                document.getElementById('statL1').textContent = l1Count;
                document.getElementById('statL2').textContent = l2Count;
                document.getElementById('statTotal').textContent = allTraces.length;
            } else {
                statsBar.style.display = 'none';
            }

            if (allTraces.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无 Trace</div>';
                return;
            }

            const llmConfig = loadLLMConfig();
            const llmReady = !!(llmConfig.enabled && llmConfig.apiKey);

            let html = '<div class="trace-list">';
            html += `<div class="trace-header-row">
                <div></div>
                <div>Trace</div>
                <div>状态</div>
                <div>归属团队</div>
                <div>置信度</div>
                <div>Span</div>
                <div>操作</div>
            </div>`;

            allTraces.forEach((item, idx) => {
                const status = getTraceStatus(item);
                const t = item.triage || {};
                const analyzed = item.analyzed;
                const owner = t.primary_owner || 'unknown';
                const confidence = t.confidence != null ? Math.round(t.confidence * 100) : 0;
                const confColor = confidence >= 70 ? '#1a7f37' : confidence >= 40 ? '#9a6700' : '#cf222e';
                const spanCount = item.span_count || 0;
                const displayName = item.name.replace(/_/g, ' ');
                const source = t.source || '';

                let rowClass = 'not-analyzed';
                if (analyzed) {
                    rowClass = status === 'error' ? 'has-error' : status === 'anomaly' ? 'has-warning' : 'all-ok';
                }

                // Source badge next to name
                let sourceBadge = '';
                if (analyzed && source) {
                    const srcLabel = source === 'llm' ? 'L2' : 'L1';
                    const srcClass = source === 'llm' ? 'llm' : 'rules';
                    sourceBadge = `<span class="source-badge ${srcClass}">${srcLabel}</span>`;
                }

                // Action button — 始终提供归因分析（点击可重新分析）
                let actionHtml = '';
                if (item.analyzing) {
                    actionHtml = `<button class="analyze-btn" disabled><span class="spinner-sm"></span>分析中</button>`;
                } else {
                    const useL2 = llmReady;
                    actionHtml = `<button class="analyze-btn${useL2 ? ' l2' : ''}" onclick="event.stopPropagation();analyzeTrace(${idx}, ${useL2})">归因分析</button>`;
                }

                html += `<div class="trace-row ${rowClass}" onclick="${analyzed ? `toggleDetail(${idx})` : ''}" id="row-${idx}" style="${analyzed ? 'cursor:pointer' : 'cursor:default'}">
                    <div class="row-expand" id="expand-${idx}">${analyzed ? '&#9654;' : ''}</div>
                    <div class="row-name">
                        <span class="trace-label">${escapeHtml(displayName)}</span>
                        ${item.uploaded ? '<span style="font-size:10px;color:#0969da;margin-left:6px">已上传</span>' : ''}
                        ${sourceBadge}
                    </div>
                    <div class="row-status">${analyzed ? `<span class="status-badge ${status}">${getStatusLabel(status)}</span>` : '<span class="placeholder-text">-</span>'}</div>
                    <div class="row-owner">${analyzed ? `<span class="owner-badge ${owner}">${getOwnerLabel(owner)}</span>` : '<span class="placeholder-text">-</span>'}</div>
                    <div class="row-confidence">${analyzed ? `<div class="confidence-mini"><div class="bar"><div class="fill" style="width:${confidence}%;background:${confColor}"></div></div><span>${confidence}%</span></div>` : '<span class="placeholder-text">-</span>'}</div>
                    <div class="row-spans">${analyzed ? spanCount : '<span class="placeholder-text">-</span>'}</div>
                    <div>${actionHtml}</div>
                </div>`;
                html += `<div class="detail-panel" id="detail-${idx}">${analyzed ? renderDetail(item) : ''}</div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function toggleDetail(idx) {
            const item = allTraces[idx];
            if (!item.analyzed) return;

            const panel = document.getElementById(`detail-${idx}`);
            const expand = document.getElementById(`expand-${idx}`);
            const row = document.getElementById(`row-${idx}`);
            const isOpen = panel.classList.contains('open');

            // Close all
            document.querySelectorAll('.detail-panel.open').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.row-expand.open').forEach(e => e.classList.remove('open'));
            document.querySelectorAll('.trace-row.expanded').forEach(r => r.classList.remove('expanded'));

            if (!isOpen) {
                panel.classList.add('open');
                expand.classList.add('open');
                row.classList.add('expanded');
            }
        }

        function renderDetail(item) {
            const t = item.triage || {};
            const spans = item.spans || [];
            const faultSpanId = t.fault_span ? t.fault_span.span_id : null;

            let html = '<div class="detail-grid">';

            // Triage summary
            const source = t.source || 'rules';
            const sourceBadge = `<span class="source-badge ${source}">${source === 'llm' ? 'L2 LLM' : 'L1 规则'}</span>`;

            html += `<div class="detail-section">
                <h3>定界结果 ${sourceBadge}</h3>
                <div class="triage-summary">
                    <div style="margin-bottom:8px">
                        <strong>主责团队:</strong> <span class="owner-badge ${t.primary_owner || 'unknown'}">${getOwnerLabel(t.primary_owner || 'unknown')}</span>
                    </div>`;
            if (t.co_responsible && t.co_responsible.length > 0) {
                html += `<div style="margin-bottom:8px"><strong>共同责任:</strong>
                    <div class="co-responsible">${t.co_responsible.map(c => `<span class="co-badge">${getOwnerLabel(c)}</span>`).join('')}</div>
                </div>`;
            }
            if (t.root_cause) {
                html += `<div class="root-cause-text">${escapeHtml(t.root_cause)}</div>`;
            }
            if (t.reasoning) {
                html += `<div class="reasoning-text">${escapeHtml(t.reasoning)}</div>`;
            }
            html += `</div></div>`;

            // Evidence chain
            if (t.fault_chain && t.fault_chain.length > 0) {
                html += `<div class="detail-section"><h3>证据链</h3>`;
                t.fault_chain.forEach((s, i) => {
                    const arrow = i === 0 ? '&#9679;' : '&#8593;';
                    const label = i === 0 ? '根因' : `第 ${i} 层`;
                    html += `<div class="chain-item">
                        <div class="chain-arrow">${arrow}</div>
                        <div class="chain-content">
                            <strong>${label}</strong>
                            <span class="span-ref">${escapeHtml(s.name)}</span>
                            [${s.layer}] — ${s.status}
                            ${s.status_message ? '<br><span style="color:#656d76">' + escapeHtml(s.status_message) + '</span>' : ''}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }

            // Waterfall (full width)
            if (spans.length > 0) {
                let minTime = Infinity, maxTime = 0;
                spans.forEach(s => {
                    if (s.start_time_unix_nano < minTime) minTime = s.start_time_unix_nano;
                    if (s.end_time_unix_nano > maxTime) maxTime = s.end_time_unix_nano;
                });
                const totalRange = maxTime - minTime || 1;

                const sortedSpans = [...spans].sort((a, b) => a.start_time_unix_nano - b.start_time_unix_nano);

                html += `<div class="detail-section full-width"><h3>Trace 瀑布图 (${spans.length} spans)</h3>
                    <div class="waterfall-compact">`;
                sortedSpans.forEach(s => {
                    const depth = s.depth || 0;
                    const indent = depth * 16;
                    const isError = s.status === 'ERROR';
                    const isAnomaly = !isError && (s.attributes && (
                        s.attributes['gen_ai.response.finish_reasons'] === 'content_filter' ||
                        s.attributes['gen_ai.response.finish_reasons'] === 'max_tokens'
                    ));
                    const isFault = s.span_id === faultSpanId;
                    const statusClass = isError ? 'error' : isAnomaly ? 'anomaly' : 'ok';
                    const faultClass = isFault ? ' root-cause-span' : '';
                    const layerClass = `layer-${s.layer}`;
                    const barLeft = ((s.start_time_unix_nano - minTime) / totalRange * 100).toFixed(1);
                    const barWidth = Math.max(((s.end_time_unix_nano - s.start_time_unix_nano) / totalRange * 100), 0.5).toFixed(1);
                    const durationMs = s.duration_ms != null ? s.duration_ms.toFixed(0) : '?';

                    html += `<div class="span-row">
                        <div class="span-name ${statusClass}${faultClass}" style="padding-left:${indent}px">
                            ${isFault ? '&#9654; ' : ''}${escapeHtml(s.name)}
                            <span class="span-layer-tag ${layerClass}">${s.layer}</span>
                        </div>
                        <div class="span-bar-area">
                            <div class="span-bar ${statusClass}" style="margin-left:${barLeft}%;width:${barWidth}%"></div>
                        </div>
                        <div class="span-duration">${durationMs}ms</div>
                    </div>`;
                });
                html += `</div></div>`;
            }

            // Action items (full width)
            if (t.action_items && t.action_items.length > 0) {
                html += `<div class="detail-section full-width"><h3>行动项</h3>`;
                t.action_items.forEach(item => {
                    const teamMatch = item.match(/^\[([^\]]+)\]/);
                    const team = teamMatch ? teamMatch[1] : '';
                    const text = teamMatch ? item.slice(teamMatch[0].length).trim() : item;
                    html += `<div class="action-item">
                        ${team ? `<span class="action-team">[${team}]</span> ` : ''}${escapeHtml(text)}
                    </div>`;
                });
                html += `</div>`;
            }

            html += '</div>';
            return html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        init();
    </script>
</body>
</html>
